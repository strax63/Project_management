<mat-card>
    <mat-card-header>
        <mat-card-title>Prijava</mat-card-title>
    </mat-card-header>

    <mat-card-content>
        <mat-form-field appearance = "outline">
            <mat-label>Korisnicko ime</mat-label>
            <input matInput #usernameInput>
            <mat-icon matSuffix>person</mat-icon>
        </mat-form-field>

        <mat-form-field appearance = "outline">
            <mat-label>Lozinka</mat-label>
            <input matInput type="password" #passwordInput>
            <mat-icon matSuffix>lock</mat-icon>
        </mat-form-field>
    </mat-card-content>

    <mat-card-actions>
        <button mat-raised-button color="primary" (click) ="login(usernameInput.value, passwordInput.value)">
            <mat-icon>login</mat-icon>
            Prijavi se
        </button>
    </mat-card-actions>
</mat-card>
